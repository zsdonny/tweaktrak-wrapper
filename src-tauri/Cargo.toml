[package]
name = "tweaktrak-wrapper"
version = "0.1.0"
edition = "2021"
description = "TweakTrak desktop wrapper"
license = "Unlicense"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }

[profile.release-ci]
inherits = "release"
lto = true
codegen-units = 1
opt-level = "z"
strip = "symbols"
panic = "abort"
