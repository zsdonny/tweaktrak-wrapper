name: update-baseline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-baseline:
    runs-on: ubuntu-latest
    environment: baseline-approval
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install fetch dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp wget2 httrack rsync

      - name: Fetch latest site snapshot
        run: |
          chmod +x scripts/fetch-site.sh
          scripts/fetch-site.sh site

      - name: Run integrity checks
        run: |
          chmod +x scripts/verify-site.sh
          scripts/verify-site.sh site .github/site-baseline.json .github/allowed-domains.txt

      # D′: the baseline is auto-committed only when VirusTotal + retire.js +
      # size sanity all pass on the freshly fetched snapshot. Failure aborts
      # the commit and opens a tracking issue with the scan report.
      - name: Delta security scan (VT + retire.js, hard gate)
        id: delta-scan
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          # Fresh uploads (cache miss) of the inlined index.html can take
          # noticeably longer than 5 min on the public VT tier while ~70
          # engines complete; bump the per-file poll deadline to 10 min.
          VT_POLL_TIMEOUT_SEC: "600"
        run: |
          chmod +x scripts/scan-delta.sh
          scripts/scan-delta.sh site

      - name: Upload delta scan report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: baseline-refresh-scan
          path: scan-out/**
          if-no-files-found: warn

      - name: Open issue on scan failure
        if: failure() && steps.delta-scan.conclusion == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('scan-out/scan-report.md')
              ? fs.readFileSync('scan-out/scan-report.md', 'utf8')
              : '_Delta scan report not produced._';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Baseline refresh blocked by delta scan (${new Date().toISOString().slice(0, 10)})`,
              body: `Auto-commit of \`.github/site-baseline.json\` was blocked because the freshly fetched snapshot failed the VirusTotal / retire.js / size-sanity hard gate.\n\n${body}\n\nReview the scan report and the upstream site before re-running this workflow.`
            });

      - name: Compute updated baseline hashes
        shell: bash
        run: |
          set -euo pipefail

          main_js="$(grep -oE '<script[^>]+src="[^"]+"' site/index.html | sed -E 's/.*src="([^"]+)"/\1/' | grep -Ei '\.js($|\?)' | head -n1 || true)"
          main_js="${main_js%%\?*}"
          main_js="${main_js#./}"
          main_js="${main_js#/}"
          if [[ -z "$main_js" || ! -f "site/$main_js" ]]; then
            main_js="$(find site -type f -name '*.js' -printf '%s %P\n' | sort -nr | head -n1 | awk '{print $2}')"
          fi

          index_hash="$(sha256sum site/index.html | awk '{print $1}')"
          if [[ -n "$main_js" && -f "site/$main_js" ]]; then
            main_hash="$(sha256sum "site/$main_js" | awk '{print $1}')"
          else
            # Self-contained SPA: no separate main JS file (assets are inlined
            # or bundled into index.html). Mirror the fallback in
            # scripts/verify-site.sh so the baseline still represents the
            # current site and future drift is detected via index.html.
            main_js="(inlined in index.html)"
            main_hash="$index_hash"
          fi
          now="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          cat > .github/site-baseline.json <<JSON
          {
            "index_html_sha256": "$index_hash",
            "main_js_sha256": "$main_hash",
            "main_js_path": "$main_js",
            "updated_at": "$now"
          }
          JSON

      - name: Commit updated baseline
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet .github/site-baseline.json; then
            echo "No baseline change detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/site-baseline.json
          git commit -m "chore: refresh site hash baseline"
          git push
