name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Default to least-privilege; jobs opt in to anything more.
permissions:
  contents: read

jobs:
  check-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      tauri_changed: ${{ steps.filter.outputs.tauri }}
      electron_changed: ${{ steps.filter.outputs.electron }}
      workflow_changed: ${{ steps.filter.outputs.workflow }}
      baseline_changed: ${{ steps.filter.outputs.baseline }}
      android_changed: ${{ steps.filter.outputs.android }}
      site_signature: ${{ steps.signature.outputs.site_signature }}
      calver_version: ${{ steps.calver.outputs.calver_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect wrapper / workflow / baseline changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            tauri:
              - 'src-tauri/**'
            electron:
              - 'electron/**'
            workflow:
              - '.github/workflows/**'
            baseline:
              - '.github/site-baseline.json'
            android:
              - 'src-tauri/gen/android/**'

      - name: Compute remote site signature (ETag + Last-Modified)
        id: signature
        shell: bash
        run: |
          set -euo pipefail
          headers="$(curl -fsSI https://tweaktrak.ibiza.dev/)"
          etag="$(printf '%s\n' "$headers" | awk -F': ' 'tolower($1)=="etag" {print $2}' | tr -d '\r' | head -n1)"
          last_modified="$(printf '%s\n' "$headers" | awk -F': ' 'tolower($1)=="last-modified" {print $2}' | tr -d '\r' | head -n1)"
          signature="$(printf '%s|%s' "$etag" "$last_modified" | sha256sum | awk '{print $1}')"
          echo "site_signature=$signature" >> "$GITHUB_OUTPUT"

      - name: Compute CalVer version
        id: calver
        shell: bash
        run: |
          set -euo pipefail
          base="$(date -u +'%Y.%-m.%-d')"
          git fetch --tags --quiet || true
          version="${base}"
          if git rev-parse -q --verify "refs/tags/v${base}" >/dev/null; then
            n=1
            while git rev-parse -q --verify "refs/tags/v${base}-${n}" >/dev/null; do
              n=$((n+1))
            done
            version="${base}-${n}"
          fi
          echo "calver_version=${version}" >> "$GITHUB_OUTPUT"

  fetch-site:
    runs-on: ubuntu-latest
    needs: check-changes
    permissions:
      contents: read
      issues: write
    outputs:
      cache_hit: ${{ steps.cache-site.outputs.cache-hit }}
      hash_changed: ${{ steps.verify.outputs.hash_changed }}
      integrity_passed: ${{ steps.verify.outputs.integrity_passed }}
      delta_scan_passed: ${{ steps.delta-scan.outputs.scan_passed || 'skipped' }}
      index_html_sha256: ${{ steps.hashes.outputs.index_html_sha256 }}
      main_js_path: ${{ steps.hashes.outputs.main_js_path }}
      main_js_sha256: ${{ steps.hashes.outputs.main_js_sha256 }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore site cache
        id: cache-site
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: site
          # Include fetch-site.sh in the cache key so changes to the
          # mirror logic (e.g. the cross-origin script localizer) reliably
          # invalidate stale cached mirrors that would otherwise mask
          # downstream smoke regressions.
          key: site-${{ hashFiles('scripts/fetch-site.sh') }}-${{ needs.check-changes.outputs.site_signature }}

      - name: Install fetch dependencies
        if: steps.cache-site.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget wget2 httrack rsync

      - name: Fetch site mirror (cache miss)
        if: steps.cache-site.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/fetch-site.sh
          scripts/fetch-site.sh site

      - name: Verify mirrored site integrity
        id: verify
        run: |
          chmod +x scripts/verify-site.sh
          scripts/verify-site.sh site .github/site-baseline.json .github/allowed-domains.txt

      - name: Compute current site hashes
        id: hashes
        shell: bash
        run: |
          set -euo pipefail
          main_js="$(grep -oE '<script[^>]+src="[^"]+"' site/index.html | sed -E 's/.*src="([^"]+)"/\1/' | grep -Ei '\.js($|\?)' | head -n1 || true)"
          main_js="${main_js%%\?*}"; main_js="${main_js#./}"; main_js="${main_js#/}"
          if [[ -z "$main_js" || ! -f "site/$main_js" ]]; then
            main_js="$(find site -type f -name '*.js' -printf '%s %P\n' | sort -nr | head -n1 | awk '{print $2}')"
          fi
          index_hash="$(sha256sum site/index.html | awk '{print $1}')"
          if [[ -n "$main_js" && -f "site/$main_js" ]]; then
            main_hash="$(sha256sum "site/$main_js" | awk '{print $1}')"
          else
            main_js="(inlined in index.html)"
            main_hash="$index_hash"
          fi
          {
            echo "index_html_sha256=$index_hash"
            echo "main_js_path=$main_js"
            echo "main_js_sha256=$main_hash"
          } >> "$GITHUB_OUTPUT"

      # E + F: VirusTotal + retire.js are HARD gates whenever the site
      # baseline hash has drifted. A failure here aborts the workflow before
      # any binary is built or published.
      - name: Delta security scan (VT + retire.js, hard gate)
        id: delta-scan
        if: steps.verify.outputs.hash_changed == 'true'
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          # Fresh uploads (cache miss) of the inlined index.html can take
          # noticeably longer than 5 min on the public VT tier while ~70
          # engines complete; bump the per-file poll deadline to 10 min.
          VT_POLL_TIMEOUT_SEC: "600"
        run: |
          chmod +x scripts/scan-delta.sh
          scripts/scan-delta.sh site

      - name: Upload delta scan report
        if: steps.verify.outputs.hash_changed == 'true' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: delta-scan-report
          path: scan-out/**
          if-no-files-found: warn

      - name: Create issue on baseline hash drift
        if: steps.verify.outputs.hash_changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const hashBody = fs.existsSync('site-hash-diff.md')
              ? fs.readFileSync('site-hash-diff.md', 'utf8')
              : 'Site hash baseline mismatch detected.';
            const scanBody = fs.existsSync('scan-out/scan-report.md')
              ? fs.readFileSync('scan-out/scan-report.md', 'utf8')
              : '_Delta scan report not produced._';
            const approveUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/update-baseline.yml`;
            const approveButton = `\n\n---\n### Approve this change\nIf the site update looks legitimate, click the link below to re-fetch, re-scan, and commit the new baseline — a release build will follow automatically.\n\n**[▶ Run update-baseline workflow](${approveUrl})**`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Site baseline hash changed (${new Date().toISOString().slice(0, 10)})`,
              body: `${hashBody}\n\n${scanBody}${approveButton}`
            });

      - name: Upload mirrored site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mirrored-site
          path: site
          if-no-files-found: error

  smoke-electron:
    # Runtime smoke gate. Boots the real electron/main.js against the
    # freshly mirrored site/ in xvfb and asserts that the SPA actually
    # mounts under the wrapper's offline + CSP constraints. Fails the
    # release if the mirrored site references external assets the wrapper
    # hard-blocks at runtime, or if the renderer logs CSP violations / JS
    # errors, or if the SPA root never gains real DOM content.
    #
    # Caveat: this only exercises the Electron (Chromium) wrapper used for
    # macOS / Linux. The Tauri (WebView2) wrapper used on Windows applies
    # an equivalent CSP and the same file:// model, so wrapper-induced
    # breakage typically reproduces here, but a Tauri-specific smoke would
    # be a useful follow-up.
    runs-on: ubuntu-latest
    needs: [check-changes, fetch-site]
    permissions:
      contents: read
    outputs:
      smoke_passed: ${{ steps.smoke.outputs.smoke_passed || 'false' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download mirrored site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mirrored-site
          path: site

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package.json

      - name: Install Electron + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          (cd electron && npm install)

      - name: Run Electron smoke gate
        id: smoke
        run: |
          chmod +x scripts/smoke-electron.sh
          scripts/smoke-electron.sh site

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-electron-report
          path: smoke-out/**
          if-no-files-found: warn

  smoke-tauri-windows:
    # Companion to smoke-electron, exercising the Tauri / WebView2 wrapper
    # that ships on Windows. Builds a debug exe with the `smoke` cargo
    # feature (which adds a JS bootstrap injected on page-load-started
    # that captures console / runtime errors and posts a JSON report via
    # an IPC command) and asserts the same pass criteria the Electron
    # smoke uses: SPA mounted under #root, no fatal console messages, no
    # runtime errors / CSP violations.
    #
    # Limitation: the bootstrap is injected on page-load-started, which
    # is slightly later than Electron's native console-message hook.
    # Errors that fire during the very first HTML parse may be missed
    # here; the Electron smoke remains the canonical CSP gate. This job
    # is supplementary coverage so a Tauri-wrapper-specific regression
    # (WebView2-only behaviour, IPC bridge breakage, etc.) cannot ship
    # silently.
    runs-on: windows-latest
    needs: [check-changes, fetch-site]
    permissions:
      contents: read
    outputs:
      smoke_passed: ${{ steps.smoke.outputs.smoke_passed || 'false' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download mirrored site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mirrored-site
          path: site

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry + smoke target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-smoke-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-smoke-${{ runner.os }}-

      - name: Build Tauri smoke binary
        working-directory: src-tauri
        shell: pwsh
        run: |
          cargo build --features smoke
          if (-not (Test-Path 'target/debug/tweaktrak-wrapper.exe')) {
            throw 'smoke build did not produce target/debug/tweaktrak-wrapper.exe'
          }

      - name: Run Tauri smoke gate
        id: smoke
        shell: pwsh
        run: |
          ./scripts/smoke-tauri.ps1 `
            -ExePath 'src-tauri/target/debug/tweaktrak-wrapper.exe' `
            -SiteDir 'site' `
            -OutputDir 'smoke-out-tauri'

      - name: Upload Tauri smoke report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-tauri-report
          path: smoke-out-tauri/**
          if-no-files-found: warn

  smoke-tauri-linux:
    # Companion smoke gate for the Tauri wrapper on Linux (WebKitGTK).
    # Builds the smoke-feature binary with ALSA MIDI support, launches it
    # under xvfb, and asserts the same pass criteria as the Windows smoke.
    runs-on: ubuntu-latest
    needs: [check-changes, fetch-site]
    permissions:
      contents: read
    outputs:
      smoke_passed: ${{ steps.smoke.outputs.smoke_passed || 'false' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download mirrored site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mirrored-site
          path: site

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install system deps (WebKitGTK + ALSA + xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev \
            libasound2-dev xvfb

      - name: Cache cargo registry + smoke target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-smoke-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-smoke-${{ runner.os }}-

      - name: Build Tauri smoke binary
        working-directory: src-tauri
        run: cargo build --features smoke

      - name: Run Tauri smoke gate (Linux)
        id: smoke
        run: |
          chmod +x scripts/smoke-tauri-unix.sh
          scripts/smoke-tauri-unix.sh \
            src-tauri/target/debug/tweaktrak-wrapper \
            site

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: smoke-tauri-linux-report
          path: smoke-out-tauri/**
          if-no-files-found: warn

  smoke-tauri-macos:
    # Companion smoke gate for the Tauri wrapper on macOS (WKWebView).
    # Builds the smoke-feature binary with CoreMIDI support and asserts the
    # same pass criteria as the Windows smoke.
    runs-on: macos-latest
    needs: [check-changes, fetch-site]
    permissions:
      contents: read
    outputs:
      smoke_passed: ${{ steps.smoke.outputs.smoke_passed || 'false' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download mirrored site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mirrored-site
          path: site

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry + smoke target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-smoke-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-smoke-${{ runner.os }}-

      - name: Build Tauri smoke binary
        working-directory: src-tauri
        run: cargo build --features smoke

      - name: Run Tauri smoke gate (macOS)
        id: smoke
        run: |
          chmod +x scripts/smoke-tauri-unix.sh
          scripts/smoke-tauri-unix.sh \
            src-tauri/target/debug/tweaktrak-wrapper \
            site

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: smoke-tauri-macos-report
          path: smoke-out-tauri/**
          if-no-files-found: warn

  build-tauri-windows:
    runs-on: windows-latest
    needs: [check-changes, fetch-site]
    if: needs.fetch-site.result == 'success' && (needs.check-changes.outputs.tauri_changed == 'true' || needs.check-changes.outputs.workflow_changed == 'true' || needs.fetch-site.outputs.cache_hit != 'true')
    permissions:
      contents: read
    outputs:
      artifact_name: tauri-windows-binary
      artifact_filename: tweaktrak-wrapper.exe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download mirrored site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mirrored-site
          path: site

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry + release-ci target
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-build-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-
            cargo-smoke-${{ runner.os }}-

      - name: Stamp CalVer into tauri.conf.json
        shell: pwsh
        run: |
          $ver = '${{ needs.check-changes.outputs.calver_version }}'
          if (-not $ver) { throw "calver_version is empty" }
          Write-Host "Stamping CalVer: $ver"
          $path = 'src-tauri/tauri.conf.json'
          $content = [IO.File]::ReadAllText($path)
          $updated = $content -replace '"version":\s*"[^"]*"', ('"version": "' + $ver + '"')
          [IO.File]::WriteAllText($path, $updated)
          Write-Host "Stamped: $((Get-Content $path -Raw | ConvertFrom-Json).version)"

      - name: Build Windows wrapper with Tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: --no-bundle -- --profile release-ci

      - name: Upload Tauri Windows binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.event_name == 'pull_request' && format('pr-{0}-tauri-windows-binary', github.event.number) || 'tauri-windows-binary' }}
          path: src-tauri/target/release-ci/tweaktrak-wrapper.exe
          if-no-files-found: error

  build-electron-macos:
    runs-on: macos-latest
    needs: [check-changes, fetch-site]
    if: needs.fetch-site.result == 'success' && (needs.check-changes.outputs.electron_changed == 'true' || needs.check-changes.outputs.workflow_changed == 'true' || needs.fetch-site.outputs.cache_hit != 'true')
    permissions:
      contents: read
    outputs:
      artifact_name: electron-macos-binary
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download mirrored site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mirrored-site
          path: site

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package.json

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Stamp CalVer into package.json
        working-directory: electron
        run: |
          version="${{ needs.check-changes.outputs.calver_version }}"
          jq --arg v "$version" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build macOS wrapper
        working-directory: electron
        run: npm run build:mac

      - name: Identify macOS deliverable
        id: mac-deliverable
        working-directory: electron
        shell: bash
        run: |
          set -euo pipefail
          # We only build the dmg target now; pick the first .dmg under dist/.
          dmg="$(find dist -maxdepth 2 -type f -name '*.dmg' | head -n1)"
          if [[ -z "$dmg" ]]; then
            echo "No .dmg produced under electron/dist" >&2
            ls -la dist || true
            exit 1
          fi
          echo "dmg_path=$dmg" >> "$GITHUB_OUTPUT"

      - name: Upload Electron macOS binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.event_name == 'pull_request' && format('pr-{0}-electron-macos-binary', github.event.number) || 'electron-macos-binary' }}
          path: electron/${{ steps.mac-deliverable.outputs.dmg_path }}
          if-no-files-found: error

  build-electron-linux:
    runs-on: ubuntu-latest
    needs: [check-changes, fetch-site]
    if: needs.fetch-site.result == 'success' && (needs.check-changes.outputs.electron_changed == 'true' || needs.check-changes.outputs.workflow_changed == 'true' || needs.fetch-site.outputs.cache_hit != 'true')
    permissions:
      contents: read
    outputs:
      artifact_name: electron-linux-binary
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download mirrored site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mirrored-site
          path: site

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package.json

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools fakeroot rpm

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Stamp CalVer into package.json
        working-directory: electron
        run: |
          version="${{ needs.check-changes.outputs.calver_version }}"
          jq --arg v "$version" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build Linux wrapper
        working-directory: electron
        run: npm run build:linux

      - name: Identify Linux deliverable
        id: linux-deliverable
        working-directory: electron
        shell: bash
        run: |
          set -euo pipefail
          appimage="$(find dist -maxdepth 2 -type f -name '*.AppImage' | head -n1)"
          if [[ -z "$appimage" ]]; then
            echo "No .AppImage produced under electron/dist" >&2
            ls -la dist || true
            exit 1
          fi
          echo "appimage_path=$appimage" >> "$GITHUB_OUTPUT"

      - name: Upload Electron Linux binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.event_name == 'pull_request' && format('pr-{0}-electron-linux-binary', github.event.number) || 'electron-linux-binary' }}
          path: electron/${{ steps.linux-deliverable.outputs.appimage_path }}
          if-no-files-found: error

  build-tauri-android:
    # Builds per-ABI APKs (arm64-v8a, armeabi-v7a, x86, x86_64), all signed
    # with the release keystore stored as a GitHub secret. Release-blocking
    # (included in release-gate).
    runs-on: ubuntu-latest
    needs: [check-changes, fetch-site]
    if: |
      needs.fetch-site.result == 'success' && (
        needs.check-changes.outputs.android_changed == 'true' ||
        needs.check-changes.outputs.tauri_changed == 'true' ||
        needs.check-changes.outputs.workflow_changed == 'true' ||
        needs.fetch-site.outputs.cache_hit != 'true'
      )
    permissions:
      contents: read
    outputs:
      artifact_name: tauri-android-apks
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download mirrored site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mirrored-site
          path: site

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK ${{ '27.2.12479018' }}
        run: |
          echo "y" | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;27.2.12479018" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache cargo registry + android target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-android-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-android-${{ runner.os }}-

      - name: Stamp CalVer into tauri.conf.json
        shell: bash
        run: |
          ver="${{ needs.check-changes.outputs.calver_version }}"
          if [[ -z "$ver" ]]; then echo "calver_version is empty" >&2; exit 1; fi
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${ver}\"/" src-tauri/tauri.conf.json

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore.jks
          echo "ANDROID_KEYSTORE_PATH=$PWD/keystore.jks" >> "$GITHUB_ENV"

      - name: Build Android APKs
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: src-tauri
        shell: bash
        run: |
          set -euo pipefail
          declare -A targets=(
            [arm64-v8a]=aarch64
            [armeabi-v7a]=armv7
            [x86]=i686
            [x86_64]=x86_64
          )
          declare -A outputs=(
            [arm64-v8a]=arm64
            [armeabi-v7a]=arm
            [x86]=x86
            [x86_64]=x86_64
          )
          declare -A native_libs=(
            [arm64-v8a]=lib/arm64-v8a/libtweaktrak_wrapper_lib.so
            [armeabi-v7a]=lib/armeabi-v7a/libtweaktrak_wrapper_lib.so
            [x86]=lib/x86/libtweaktrak_wrapper_lib.so
            [x86_64]=lib/x86_64/libtweaktrak_wrapper_lib.so
          )

          rm -rf ../apk-out
          mkdir -p ../apk-out

          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            target="${targets[$abi]}"
            output="${outputs[$abi]}"
            echo "::group::Build Android APK for ${abi} (${target})"
            rm -rf gen/android/app/build/outputs/apk
            npx --yes @tauri-apps/cli@2.10.1 android build --apk --split-per-abi --target "$target"

            apk="$(find gen/android/app/build/outputs/apk/${output}/release \
              -type f -name "*-${abi}-release.apk" -not -name "*-unsigned*" \
              | sort | head -n1)"
            staged="../apk-out/TweakTrak-android-${abi}.apk"
            [[ -f "$apk" ]] || { echo "Missing APK: $apk" >&2; find gen/android/app/build/outputs/apk -type f -name '*.apk' -print >&2 || true; exit 1; }
            cp "$apk" "$staged"

            if ! unzip -l "$staged" | grep -Fq "${native_libs[$abi]}"; then
              echo "Missing native library ${native_libs[$abi]} in $staged" >&2
              unzip -l "$staged" | grep -E 'lib/.+\.so' >&2 || true
              exit 1
            fi
            echo "::endgroup::"
          done

          echo "Staged APKs:"
          ls -lh ../apk-out/

      - name: Upload Android APKs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ github.event_name == 'pull_request' && format('pr-{0}-tauri-android-apks', github.event.number) || 'tauri-android-apks' }}
          path: apk-out/*.apk
          if-no-files-found: error

  smoke-android:
    # Advisory Android smoke test: installs the x86_64 APK on an emulator and
    # verifies the app process launches without crashing.
    # continue-on-error: this does NOT block releases; emulator flakiness is
    # acceptable in CI — a failure here triggers investigation, not a block.
    runs-on: ubuntu-latest
    needs: [build-tauri-android]
    if: needs.build-tauri-android.result == 'success'
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Android APKs
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ github.event_name == 'pull_request' && format('pr-{0}-tauri-android-apks', github.event.number) || 'tauri-android-apks' }}
          path: apk-out

      - name: Run Android emulator smoke test (API 33 x86_64)
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 33
          arch: x86_64
          profile: Nexus 6
          script: |
            adb install -r apk-out/TweakTrak-android-x86_64.apk
            adb shell am start -n dev.ibiza.tweaktrak.wrapper/.MainActivity
            sleep 8
            adb shell pidof dev.ibiza.tweaktrak.wrapper >/dev/null || (echo "smoke-android: app process not found" && exit 1)
            echo "smoke-android: PASSED"

  build-tauri-linux:
    # Tauri wrapper for Linux — dual-shipped alongside the Electron build for
    # one release cycle while MIDI parity is validated in the wild.
    runs-on: ubuntu-latest
    needs: [check-changes, fetch-site]
    if: needs.fetch-site.result == 'success' && (needs.check-changes.outputs.tauri_changed == 'true' || needs.check-changes.outputs.workflow_changed == 'true' || needs.fetch-site.outputs.cache_hit != 'true')
    permissions:
      contents: read
    outputs:
      artifact_name: tauri-linux-binary
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download mirrored site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mirrored-site
          path: site

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Install system deps (WebKitGTK + ALSA)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev \
            libasound2-dev \
            libarchive-tools fakeroot rpm

      - name: Cache cargo registry + release-ci target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-build-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-
            cargo-smoke-${{ runner.os }}-

      - name: Stamp CalVer into tauri.conf.json
        run: |
          ver="${{ needs.check-changes.outputs.calver_version }}"
          [[ -n "$ver" ]] || { echo "calver_version is empty" >&2; exit 1; }
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$ver\"/" src-tauri/tauri.conf.json
          echo "Stamped: $(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")"

      - name: Build Linux wrapper with Tauri
        uses: tauri-apps/tauri-action@94571df7fd79dbe2aee6d279c0a6b66d086d3b3b # v0.5.19
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: --bundles appimage,deb,rpm -- --profile release-ci

      - name: Locate AppImage
        id: linux-tauri-deliverable
        shell: bash
        run: |
          set -euo pipefail
          appimage="$(find src-tauri/target/release-ci/bundle/appimage -type f -name '*.AppImage' | head -n1)"
          if [[ -z "$appimage" ]]; then
            echo "No AppImage produced" >&2
            find src-tauri/target/release-ci/bundle || true
            exit 1
          fi
          echo "appimage_path=$appimage" >> "$GITHUB_OUTPUT"

      - name: Upload Tauri Linux binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ github.event_name == 'pull_request' && format('pr-{0}-tauri-linux-binary', github.event.number) || 'tauri-linux-binary' }}
          path: ${{ steps.linux-tauri-deliverable.outputs.appimage_path }}
          if-no-files-found: error

      - name: Locate .deb package
        id: linux-tauri-deb
        shell: bash
        run: |
          set -euo pipefail
          deb="$(find src-tauri/target/release-ci/bundle/deb -type f -name '*.deb' | head -n1)"
          if [[ -z "$deb" ]]; then
            echo "No .deb produced" >&2
            find src-tauri/target/release-ci/bundle || true
            exit 1
          fi
          echo "deb_path=$deb" >> "$GITHUB_OUTPUT"

      - name: Upload Tauri Linux .deb
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ github.event_name == 'pull_request' && format('pr-{0}-tauri-linux-deb', github.event.number) || 'tauri-linux-deb' }}
          path: ${{ steps.linux-tauri-deb.outputs.deb_path }}
          if-no-files-found: error

      - name: Locate .rpm package
        id: linux-tauri-rpm
        shell: bash
        run: |
          set -euo pipefail
          rpm_pkg="$(find src-tauri/target/release-ci/bundle/rpm -type f -name '*.rpm' | head -n1)"
          if [[ -z "$rpm_pkg" ]]; then
            echo "No .rpm produced" >&2
            find src-tauri/target/release-ci/bundle || true
            exit 1
          fi
          echo "rpm_path=$rpm_pkg" >> "$GITHUB_OUTPUT"

      - name: Upload Tauri Linux .rpm
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ github.event_name == 'pull_request' && format('pr-{0}-tauri-linux-rpm', github.event.number) || 'tauri-linux-rpm' }}
          path: ${{ steps.linux-tauri-rpm.outputs.rpm_path }}
          if-no-files-found: error

  build-tauri-macos:
    # Tauri wrapper for macOS — dual-shipped alongside the Electron build for
    # one release cycle while MIDI parity is validated in the wild.
    runs-on: macos-latest
    needs: [check-changes, fetch-site]
    if: needs.fetch-site.result == 'success' && (needs.check-changes.outputs.tauri_changed == 'true' || needs.check-changes.outputs.workflow_changed == 'true' || needs.fetch-site.outputs.cache_hit != 'true')
    permissions:
      contents: read
    outputs:
      artifact_name: tauri-macos-binary
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download mirrored site
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: mirrored-site
          path: site

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry + release-ci target
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-build-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-
            cargo-smoke-${{ runner.os }}-

      - name: Stamp CalVer into tauri.conf.json
        run: |
          ver="${{ needs.check-changes.outputs.calver_version }}"
          [[ -n "$ver" ]] || { echo "calver_version is empty" >&2; exit 1; }
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"$ver\"/" src-tauri/tauri.conf.json
          echo "Stamped: $(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")"

      - name: Build macOS wrapper with Tauri
        uses: tauri-apps/tauri-action@94571df7fd79dbe2aee6d279c0a6b66d086d3b3b # v0.5.19
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: --bundles dmg -- --profile release-ci

      - name: Locate DMG
        id: macos-tauri-deliverable
        shell: bash
        run: |
          set -euo pipefail
          dmg="$(find src-tauri/target/release-ci/bundle/dmg -type f -name '*.dmg' | head -n1)"
          if [[ -z "$dmg" ]]; then
            echo "No DMG produced" >&2
            find src-tauri/target/release-ci/bundle || true
            exit 1
          fi
          echo "dmg_path=$dmg" >> "$GITHUB_OUTPUT"

      - name: Upload Tauri macOS binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ github.event_name == 'pull_request' && format('pr-{0}-tauri-macos-binary', github.event.number) || 'tauri-macos-binary' }}
          path: ${{ steps.macos-tauri-deliverable.outputs.dmg_path }}
          if-no-files-found: error

  pr-gate:
    # Explicit pull-request gate. The smoke jobs already run on PRs and
    # GitHub will surface any of them as a failed check, but this
    # aggregator job gives branch protection a single required-status
    # anchor and fails fast if any smoke or build prerequisite did not
    # pass on a PR run. Mirrors release-gate but only fires on PRs.
    runs-on: ubuntu-latest
    needs:
      - fetch-site
      - smoke-electron
      - smoke-tauri-windows
      - smoke-tauri-linux
      - smoke-tauri-macos
      - build-tauri-android
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Enforce PR gate
        shell: bash
        run: |
          set -euo pipefail
          fail() { echo "$*" >&2; exit 1; }

          if [[ "${{ needs.fetch-site.result }}" != "success" ]]; then
            fail "Fetch/verify phase failed; PR is blocked."
          fi
          if [[ "${{ needs.smoke-electron.result }}" != "success" ]]; then
            fail "Electron smoke gate failed on this PR. See the smoke-electron-report artifact."
          fi
          if [[ "${{ needs.smoke-tauri-windows.result }}" != "success" ]]; then
            fail "Tauri (Windows) smoke gate failed on this PR. See the smoke-tauri-report artifact."
          fi
          if [[ "${{ needs.smoke-tauri-linux.result }}" != "success" ]]; then
            fail "Tauri (Linux) smoke gate failed on this PR. See the smoke-tauri-linux-report artifact."
          fi
          if [[ "${{ needs.smoke-tauri-macos.result }}" != "success" ]]; then
            fail "Tauri (macOS) smoke gate failed on this PR. See the smoke-tauri-macos-report artifact."
          fi
          android="${{ needs.build-tauri-android.result }}"
          if [[ "$android" == "failure" || "$android" == "cancelled" ]]; then
            fail "Android build failed on this PR; PR is blocked."
          fi
          echo "PR gate passed."

  release-gate:
    runs-on: ubuntu-latest
    needs:
      - fetch-site
      - smoke-electron
      - smoke-tauri-windows
      - smoke-tauri-linux
      - smoke-tauri-macos
      - build-tauri-windows
      - build-tauri-linux
      - build-tauri-macos
      - build-electron-macos
      - build-electron-linux
      - build-tauri-android
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: read
    outputs:
      gate_passed: ${{ steps.gate.outputs.passed }}
    steps:
      - name: Enforce release gate
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          fail() { echo "$*" >&2; echo "passed=false" >> "$GITHUB_OUTPUT"; exit 1; }

          if [[ "${{ needs.fetch-site.result }}" != "success" ]]; then
            fail "Fetch/verify phase failed; release is blocked."
          fi
          if [[ "${{ needs.fetch-site.outputs.hash_changed }}" == "true" ]]; then
            fail "Baseline hash drift detected; release is blocked pending review."
          fi
          if [[ "${{ needs.smoke-electron.result }}" != "success" ]]; then
            fail "Electron smoke gate failed; release is blocked. See the smoke-electron-report artifact."
          fi
          if [[ "${{ needs.smoke-tauri-windows.result }}" != "success" ]]; then
            fail "Tauri (Windows) smoke gate failed; release is blocked. See the smoke-tauri-report artifact."
          fi
          if [[ "${{ needs.smoke-tauri-linux.result }}" != "success" ]]; then
            fail "Tauri (Linux) smoke gate failed; release is blocked. See the smoke-tauri-linux-report artifact."
          fi
          if [[ "${{ needs.smoke-tauri-macos.result }}" != "success" ]]; then
            fail "Tauri (macOS) smoke gate failed; release is blocked. See the smoke-tauri-macos-report artifact."
          fi
          for result in \
            "${{ needs.build-tauri-windows.result }}" \
            "${{ needs.build-tauri-linux.result }}" \
            "${{ needs.build-tauri-macos.result }}" \
            "${{ needs.build-electron-macos.result }}" \
            "${{ needs.build-electron-linux.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              fail "A platform build failed or was cancelled; release is blocked."
            fi
          done
          android="${{ needs.build-tauri-android.result }}"
          if [[ "$android" == "failure" || "$android" == "cancelled" ]]; then
            fail "Android build failed or was cancelled; release is blocked."
          fi
          echo "Release gate passed."
          echo "passed=true" >> "$GITHUB_OUTPUT"

  # C + policy B: publish to GitHub Releases on wrapper-or-site delta only,
  # CalVer YYYY.M.D[.N], rich body, bare executables (no zip wrapping).
  release-publish:
    runs-on: ubuntu-latest
    needs:
      - check-changes
      - fetch-site
      - smoke-electron
      - smoke-tauri-windows
      - smoke-tauri-linux
      - smoke-tauri-macos
      - build-tauri-windows
      - build-tauri-linux
      - build-tauri-macos
      - build-electron-macos
      - build-electron-linux
      - build-tauri-android
      - release-gate
    if: |
      always() && github.event_name != 'pull_request' &&
      needs.release-gate.outputs.gate_passed == 'true' &&
      needs.build-tauri-windows.result == 'success' &&
      needs.build-tauri-linux.result == 'success' &&
      needs.build-tauri-macos.result == 'success' &&
      needs.build-electron-macos.result == 'success' &&
      needs.build-electron-linux.result == 'success' &&
      (
        needs.check-changes.outputs.tauri_changed == 'true' ||
        needs.check-changes.outputs.electron_changed == 'true' ||
        needs.check-changes.outputs.android_changed == 'true' ||
        needs.check-changes.outputs.baseline_changed == 'true' ||
        needs.check-changes.outputs.workflow_changed == 'true'
      )
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Stage release assets (bare executables)
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          win_exe="$(find artifacts/tauri-windows-binary    -type f -name '*.exe'      | head -n1)"
          mac_dmg="$(find artifacts/electron-macos-binary  -type f -name '*.dmg'      | head -n1)"
          lin_app="$(find artifacts/electron-linux-binary  -type f -name '*.AppImage' | head -n1)"
          mac_tauri="$(find artifacts/tauri-macos-binary   -type f -name '*.dmg'      | head -n1)"
          lin_tauri="$(find artifacts/tauri-linux-binary   -type f -name '*.AppImage' | head -n1)"
          lin_deb="$(find artifacts/tauri-linux-deb        -type f -name '*.deb'      | head -n1)"
          lin_rpm="$(find artifacts/tauri-linux-rpm        -type f -name '*.rpm'      | head -n1)"

          [[ -n "$win_exe"   ]] || { echo "Missing Windows .exe"            >&2; exit 1; }
          [[ -n "$mac_dmg"   ]] || { echo "Missing Electron macOS .dmg"     >&2; exit 1; }
          [[ -n "$lin_app"   ]] || { echo "Missing Electron Linux .AppImage" >&2; exit 1; }
          [[ -n "$mac_tauri" ]] || { echo "Missing Tauri macOS .dmg"        >&2; exit 1; }
          [[ -n "$lin_tauri" ]] || { echo "Missing Tauri Linux .AppImage"   >&2; exit 1; }
          [[ -n "$lin_deb"   ]] || { echo "Missing Tauri Linux .deb"        >&2; exit 1; }
          [[ -n "$lin_rpm"   ]] || { echo "Missing Tauri Linux .rpm"        >&2; exit 1; }

          ver="${{ needs.check-changes.outputs.calver_version }}"
          cp "$win_exe"   "release-assets/TweakTrak-windows-x64.exe"
          cp "$mac_dmg"   "release-assets/TweakTrak-${ver}-electron-macos.dmg"
          cp "$lin_app"   "release-assets/TweakTrak-${ver}-electron-linux.AppImage"
          cp "$mac_tauri" "release-assets/TweakTrak-${ver}-tauri-macos.dmg"
          cp "$lin_tauri" "release-assets/TweakTrak-${ver}-tauri-linux.AppImage"
          cp "$lin_deb"   "release-assets/TweakTrak-${ver}-tauri-linux.deb"
          cp "$lin_rpm"   "release-assets/TweakTrak-${ver}-tauri-linux.rpm"

          # Android APKs (may not be present on runs that skipped the Android build)
          android_dir="artifacts/tauri-android-apks"
          if [[ -d "$android_dir" ]]; then
            find "$android_dir" -name '*.apk' | while read -r apk; do
              cp "$apk" "release-assets/$(basename "$apk")"
            done
          fi

          (cd release-assets && sha256sum -- * > SHA256SUMS.txt)
          {
            echo "win_asset=release-assets/TweakTrak-windows-x64.exe"
            echo "mac_electron_asset=release-assets/TweakTrak-${ver}-electron-macos.dmg"
            echo "lin_electron_asset=release-assets/TweakTrak-${ver}-electron-linux.AppImage"
            echo "mac_tauri_asset=release-assets/TweakTrak-${ver}-tauri-macos.dmg"
            echo "lin_tauri_asset=release-assets/TweakTrak-${ver}-tauri-linux.AppImage"
            echo "lin_deb_asset=release-assets/TweakTrak-${ver}-tauri-linux.deb"
            echo "lin_rpm_asset=release-assets/TweakTrak-${ver}-tauri-linux.rpm"
          } >> "$GITHUB_OUTPUT"

      - name: Compute CalVer tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.check-changes.outputs.calver_version }}"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        env:
          WIN_ASSET:          ${{ steps.stage.outputs.win_asset }}
          MAC_ELECTRON_ASSET: ${{ steps.stage.outputs.mac_electron_asset }}
          LIN_ELECTRON_ASSET: ${{ steps.stage.outputs.lin_electron_asset }}
          MAC_TAURI_ASSET:    ${{ steps.stage.outputs.mac_tauri_asset }}
          LIN_TAURI_ASSET:    ${{ steps.stage.outputs.lin_tauri_asset }}
          LIN_DEB_ASSET:      ${{ steps.stage.outputs.lin_deb_asset }}
          LIN_RPM_ASSET:      ${{ steps.stage.outputs.lin_rpm_asset }}
          REL_VERSION:        ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          win_sha=$(sha256sum "$WIN_ASSET"          | awk '{print $1}')
          mac_e_sha=$(sha256sum "$MAC_ELECTRON_ASSET" | awk '{print $1}')
          lin_e_sha=$(sha256sum "$LIN_ELECTRON_ASSET" | awk '{print $1}')
          mac_t_sha=$(sha256sum "$MAC_TAURI_ASSET"    | awk '{print $1}')
          lin_t_sha=$(sha256sum "$LIN_TAURI_ASSET"    | awk '{print $1}')
          lin_deb_sha=$(sha256sum "$LIN_DEB_ASSET"    | awk '{print $1}')
          lin_rpm_sha=$(sha256sum "$LIN_RPM_ASSET"    | awk '{print $1}')
          mac_e_name=$(basename "$MAC_ELECTRON_ASSET")
          lin_e_name=$(basename "$LIN_ELECTRON_ASSET")
          mac_t_name=$(basename "$MAC_TAURI_ASSET")
          lin_t_name=$(basename "$LIN_TAURI_ASSET")
          lin_deb_name=$(basename "$LIN_DEB_ASSET")
          lin_rpm_name=$(basename "$LIN_RPM_ASSET")

          # shellcheck disable=SC2016
          {
            echo "TweakTrak Desktop **${REL_VERSION}** — the TweakTrak app, packaged as a standalone offline application for Windows, macOS, Linux, and Android."
            echo
            echo "## Download"
            echo
            echo "Pick the file for your platform:"
            echo
            echo "| Platform | File | Notes |"
            echo "|---|---|---|"
            printf '| Windows 10/11 (x64) | `%s` | Download and double-click to launch. |\n' "TweakTrak-windows-x64.exe"
            printf '| macOS — Tauri build (recommended) | `%s` | Open the disk image and drag TweakTrak into **Applications**. Full MIDI + SysEx support via native CoreMIDI. |\n' "$mac_t_name"
            printf '| macOS — Electron build (legacy) | `%s` | Open the disk image and drag TweakTrak into **Applications**. |\n' "$mac_e_name"
            printf '| Linux — Tauri build (recommended) | `%s` | `chmod +x` the file, then double-click or run from a terminal. Full MIDI + SysEx support via ALSA. |\n' "$lin_t_name"
            printf '| Linux — Tauri build (.deb, Debian/Ubuntu) | `%s` | Install with `sudo apt install ./%s`. Full MIDI + SysEx support via ALSA. |\n' "$lin_deb_name" "$lin_deb_name"
            printf '| Linux — Tauri build (.rpm, Fedora/openSUSE) | `%s` | Install with `sudo dnf install %s` (or `sudo zypper install %s`). Full MIDI + SysEx support via ALSA. |\n' "$lin_rpm_name" "$lin_rpm_name" "$lin_rpm_name"
            printf '| Linux — Electron build (legacy) | `%s` | `chmod +x` the file, then double-click or run from a terminal. |\n' "$lin_e_name"
            printf '| Android 7.0+ (most phones, arm64-v8a) | `%s` | Sideload — see Android notes below. |\n' "TweakTrak-android-arm64-v8a.apk"
            printf '| Android 7.0+ (older 32-bit ARM) | `%s` | Sideload only for older 32-bit phones/tablets. |\n' "TweakTrak-android-armeabi-v7a.apk"
            echo
            echo "> **Note for macOS/Linux users:** Both a Tauri build and an Electron build are provided this release. The Tauri builds are recommended — they are smaller, start faster, and use native MIDI (CoreMIDI on macOS, ALSA on Linux). The Electron builds remain as a fallback; they will be retired in the next release once Tauri MIDI parity is confirmed."
            echo
            echo "## What's in this version"
            echo
            echo "- The current TweakTrak web app, bundled offline so it works with no internet connection."
            echo "- A real desktop window with its own icon — no browser, no tabs, no address bar."
            echo "- No telemetry, no tracking, no network calls. External links open in your normal browser."
            echo "- **macOS / Linux Tauri builds:** Full Web MIDI support (inputs, outputs, SysEx) via a native MIDI polyfill backed by CoreMIDI (macOS) and ALSA (Linux). SysEx access is granted silently — no permission prompt."
            echo "- **Android**: USB-MIDI and BLE-MIDI via \`navigator.requestMIDIAccess()\` — no browser needed."
            echo
            echo "## Verifying your download (optional)"
            echo
            echo "| File | SHA-256 |"
            echo "|---|---|"
            printf '| `%s` | `%s` |\n' "TweakTrak-windows-x64.exe" "$win_sha"
            printf '| `%s` | `%s` |\n' "$mac_t_name" "$mac_t_sha"
            printf '| `%s` | `%s` |\n' "$mac_e_name" "$mac_e_sha"
            printf '| `%s` | `%s` |\n' "$lin_t_name" "$lin_t_sha"
            printf '| `%s` | `%s` |\n' "$lin_deb_name" "$lin_deb_sha"
            printf '| `%s` | `%s` |\n' "$lin_rpm_name" "$lin_rpm_sha"
            printf '| `%s` | `%s` |\n' "$lin_e_name" "$lin_e_sha"
            for apk in release-assets/TweakTrak-android-*.apk; do
              [[ -f "$apk" ]] || continue
              apk_sha=$(sha256sum "$apk" | awk '{print $1}')
              printf '| `%s` | `%s` |\n' "$(basename "$apk")" "$apk_sha"
            done
            echo
            echo "All checksums are also attached as \`SHA256SUMS.txt\` — verify with \`sha256sum -c SHA256SUMS.txt\` (or \`shasum -a 256 -c SHA256SUMS.txt\` on macOS)."
            echo
            echo "## Notes"
            echo
            echo "- **Windows** uses the built-in WebView2 runtime — no extra install needed on Windows 11 or up-to-date Windows 10."
            echo "- **macOS** builds are not notarized. The first time you launch the app you may need to right-click → **Open** and confirm the Gatekeeper prompt."
            echo "- **Linux** Three formats are provided: AppImage (runs on most distros, may need \`libfuse2\`), .deb (Debian/Ubuntu: \`sudo apt install ./TweakTrak-*.deb\`), and .rpm (Fedora/openSUSE: \`sudo dnf install TweakTrak-*.rpm\`). All require an ALSA-capable sound system for MIDI (standard on all major distros)."
            echo "- **Android** APKs are not distributed via Google Play — sideloading is required. Enable *Install unknown apps* in Settings, download the \`arm64-v8a\` APK for almost all modern phones, and open it to install. Older 32-bit devices use \`armeabi-v7a\`; \`x86\`/\`x86_64\` builds are mainly for emulators and ChromeOS. Minimum Android 7.0 (API 24). USB-MIDI requires an OTG adapter; BLE-MIDI devices pair via system Bluetooth settings first."
            echo "- TweakTrak Desktop does not auto-update — grab the newest release here whenever you'd like to upgrade."
            echo
            echo "Found a bug? Please [open an issue](https://github.com/${GITHUB_REPOSITORY}/issues/new) with your OS, which build you used (Tauri or Electron), and a quick description of what happened."
          } > release-body.md
          echo "body_path=release-body.md" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: TweakTrak ${{ steps.ver.outputs.version }}
          body_path: ${{ steps.notes.outputs.body_path }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release-assets/TweakTrak-windows-x64.exe
            release-assets/*.dmg
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/TweakTrak-android-*.apk
            release-assets/SHA256SUMS.txt
