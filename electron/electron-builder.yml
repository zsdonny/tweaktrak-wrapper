appId: dev.ibiza.tweaktrak.wrapper.electron
productName: TweakTrak
asar: true

directories:
  output: dist

files:
  - main.js
  - package.json

extraResources:
  - from: ../site
    to: site

mac:
  target:
    - dmg
  category: public.app-category.music
  icon: build/icon.icns

linux:
  target:
    - AppImage
  category: Audio
  icon: build/icon.png
